!
! R5 — Distribution Router (Area 2)
! Role: Internal to Area 2, connects to ABR R3 and cross-link to R4 (Area 1)
!
hostname R5
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
 ip ospf 1 area 2
!
interface Ethernet0/1
 ip address 10.0.35.2 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 2
!
interface Ethernet0/2
 ip address 10.0.45.2 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 1
!
interface Ethernet0/3
 ip address 10.0.52.1 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 2
!
router ospf 1
 router-id 5.5.5.5
!
end
