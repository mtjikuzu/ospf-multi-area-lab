!
! R4 — Distribution Router (Area 1)
! Role: Internal to Area 1, connects to ABR R2 and cross-link to R5
!
hostname R4
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 ip ospf 1 area 1
!
interface Ethernet0/1
 ip address 10.0.24.2 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 1
!
interface Ethernet0/2
 ip address 10.0.45.1 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 1
!
interface Ethernet0/3
 ip address 10.0.41.1 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 1
!
router ospf 1
 router-id 4.4.4.4
!
end
